<!DOCTYPE html>
<!-- view/attendance.html — trang điểm danh -->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Điểm danh — EmpManager</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="image/logo_E.png" />
  <style>
    .attendance-clock {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .clock-display {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .clock-icon {
      font-size: 2rem;
      line-height: 1;
    }
    .clock-time {
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .clock-date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .admin-section {
      display: none;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .admin-section .admin-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .admin-section .admin-row .form-group {
      flex: 1;
      min-width: 160px;
      margin-bottom: 0;
    }
    .admin-section .admin-row .form-group label {
      font-weight: 500;
      font-size: .82rem;
      color: var(--text);
      display: block;
      margin-bottom: 3px;
    }
    .admin-section .admin-row .form-group select,
    .admin-section .admin-row .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font);
      font-size: .85rem;
      outline: none;
      background: var(--white);
    }
    .admin-section .admin-row .form-group select:focus,
    .admin-section .admin-row .form-group input:focus {
      border-color: #4255ff;
    }
    .admin-section .admin-row .btn {
      padding: 8px 24px;
      font-size: .85rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      background: #4255ff;
      color: #fff;
    }
    .admin-section .admin-row .btn:hover {
      background: #3345e8;
    }
    .admin-section .admin-row .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .heatmap-day .status-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      font-size: 0.5rem;
      padding: 1px 4px;
      border-radius: 8px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-weight: 600;
      display: none;
    }
    .heatmap-day.has-data .status-badge {
      display: block;
    }
    .heatmap-day .status-badge.present { background: #40c463; }
    .heatmap-day .status-badge.late { background: #f9c74f; color: #333; }
    .heatmap-day .status-badge.absent { background: #f94144; }

    .calendar-heatmap {
      margin-top: 4px;
    }
    .heatmap-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .heatmap-title {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .heatmap-title .emp-name {
      color: #4255ff;
      font-weight: 700;
    }
    .heatmap-nav {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .heatmap-nav button {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: .78rem;
      transition: background .15s;
    }
    .heatmap-nav button:hover { background: var(--bg); }
    .heatmap-nav .month-label {
      font-weight: 600;
      min-width: 90px;
      text-align: center;
      font-size: 0.85rem;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      max-width: 520px;
    }
    .heatmap-weekday {
      font-size: .6rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      padding: 3px 0;
      text-transform: uppercase;
    }
    .heatmap-day {
      aspect-ratio: 1;
      border-radius: 3px;
      background: #e8e8e8;
      cursor: default;
      transition: background .15s;
      position: relative;
      min-width: 24px;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text);
    }
    .heatmap-day.has-data {
      cursor: pointer;
    }
    .heatmap-day.has-data:hover {
      transform: scale(1.1);
      z-index: 2;
    }
    .heatmap-day.present {
      background: #40c463;
      color: #fff;
    }
    .heatmap-day.late {
      background: #f9c74f;
      color: #fff;
    }
    .heatmap-day.absent {
      background: #d1d5db;
      color: #6b7280;
    }
    .heatmap-day.today {
      outline: 2px solid #4255ff;
      outline-offset: 1px;
      font-weight: 700;
    }
    .heatmap-day.future {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
    }
    .heatmap-day.empty {
      background: transparent;
      color: transparent;
    }
    .heatmap-day.sunday {
      background: #f3f4f6;
      color: #9ca3af;
      font-size: 0.5rem;
      font-weight: 600;
    }
    .heatmap-day.sunday.has-data {
      background: #f3f4f6 !important;
      color: #9ca3af !important;
    }

    .heatmap-day .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: .65rem;
      white-space: nowrap;
      z-index: 10;
      font-weight: 500;
    }
    .heatmap-day .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--text);
    }
    .heatmap-day.has-data:hover .tooltip {
      display: block;
    }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      font-size: .7rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .heatmap-legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .heatmap-legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }
    .heatmap-legend-dot.present { background: #40c463; }
    .heatmap-legend-dot.late { background: #f9c74f; }
    .heatmap-legend-dot.absent { background: #d1d5db; border: 1px solid #b0b4b8; }
    .heatmap-legend-dot.sunday-dot { background: #f3f4f6; border: 1px solid #d0d4d8; }

    /* ===== RULES SECTION - ĐƠN GIẢN ===== */
    .rules-section {
      margin-top: 14px;
      padding: 12px 16px;
      background: #f8f9fc;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .rules-section .rules-text {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .rules-section .rules-text strong {
      color: var(--text);
      font-weight: 600;
    }
    .rules-section .rules-text .green { color: #40c463; font-weight: 600; }
    .rules-section .rules-text .yellow { color: #fab105; font-weight: 600; }
    .rules-section .rules-text .gray { color: #6b7280; font-weight: 600; }

    @media (max-width: 600px) {
      .attendance-clock {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      .clock-display {
        justify-content: center;
      }
      .clock-time {
        font-size: 1.4rem;
      }
      .admin-section .admin-row {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .heatmap-grid {
        gap: 2px;
        max-width: 100%;
      }
      .heatmap-day {
        min-width: 20px;
        min-height: 20px;
        font-size: 0.55rem;
      }
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Điểm danh</h1>
      
      <p>Xem và quản lý bảng chấm công</p>
    </div>

    <div class="card" style="padding: 16px 20px;">
      <!-- ADMIN SECTION -->
      <div class="admin-section" id="admin-section">
        <div class="admin-row">
          <div class="form-group">
            <label>Chọn nhân viên</label>
            <select id="att-emp-id" onchange="onEmployeeChange()">
              <option value="">Chọn nhân viên...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Trạng thái</label>
            <select id="att-status">
              <option value="present">Có mặt</option>
              <option value="late">Đi muộn</option>
              <option value="absent">Vắng</option>
            </select>
          </div>
          <div class="form-group">
            <label>Ngày</label>
            <input type="date" id="att-date" max="" />
          </div>
          <button class="btn" id="admin-checkin-btn" onclick="adminCheckin()">Điểm danh</button>
        </div>
      </div>

      <!-- CLOCK + USER CHECKIN -->
      <div class="attendance-clock">
        <div class="clock-display">
          <span class="clock-icon">🕐</span>
          <div>
            <div class="clock-time" id="clock-time">--:--:--</div>
            <div class="clock-date" id="clock-date">--/--/----</div>
          </div>
        </div>
        <button class="btn" id="btn-user-checkin" onclick="userCheckin()" style="display:none;padding:10px 28px;font-size:0.95rem;border-radius:10px;border:none;font-weight:600;cursor:pointer;font-family:var(--font);background:#4255ff;color:#fff;">
          Điểm danh
        </button>
      </div>
    </div>

    <div class="card" style="padding: 16px 20px;">
      <div class="calendar-heatmap">
        <div class="heatmap-header">
          <span class="heatmap-title" id="heatmap-title">Lịch sử điểm danh</span>
          <div class="heatmap-nav" id="heatmap-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <span class="month-label" id="month-label">Tháng 6 2026</span>
            <button onclick="changeMonth(1)">›</button>
          </div>
        </div>

        <!-- Calendar grid - Ẩn khi admin chưa chọn nhân viên -->
        <div id="heatmap-container">
          <div class="heatmap-grid" id="heatmap-grid"></div>
        </div>

        <div class="heatmap-legend">
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot present"></span> Có mặt
          </span>
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot late"></span> Đi muộn
          </span>
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot absent"></span> Vắng
          </span>
          <span class="heatmap-legend-item">
            <span class="heatmap-legend-dot sunday-dot"></span> Chủ nhật
          </span>
        </div>

        <!-- ===== RULES - 3 DÒNG ĐƠN GIẢN ===== -->
        <div class="rules-section">
          <div class="rules-text">
            <strong>Quy định điểm danh:</strong><br />
             <span class="green">Có mặt</span> — Điểm danh trước <strong>9:00</strong><br />
             <span class="yellow">Đi muộn</span> — Điểm danh từ <strong>9:00</strong> đến <strong>9:15</strong><br />
             <span class="gray">Vắng</span> — Điểm danh sau <strong>9:15</strong> hoặc không điểm danh
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>
<script src="main.js"></script>
<script>
  let currentUser = null;
  let attendanceData = {};
  let allAttendanceRecords = [];
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let clockInterval = null;
  let isAdmin = false;
  let currentViewEmployeeId = null;
  let employeeMap = {};

  const today = new Date().toISOString().split("T")[0];

  function getStatusByTime() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const totalMinutes = hours * 60 + minutes;

    const WORK_START = 9 * 60;
    const LATE_THRESHOLD = 9 * 60 + 15;

    if (totalMinutes <= WORK_START) {
      return 'present';
    } else if (totalMinutes <= LATE_THRESHOLD) {
      return 'late';
    } else {
      return 'absent';
    }
  }

  async function init() {
    currentUser = await requireLogin();
    if (!currentUser) return;

    isAdmin = currentUser.role === "admin";

    renderSidebar("attendance", currentUser);

    if (isAdmin) {
      document.getElementById("admin-section").style.display = "block";
      document.getElementById("att-date").max = today;
      document.getElementById("att-date").value = today;
      
      // Admin: Ẩn calendar ban đầu, chỉ hiện title
      document.getElementById("heatmap-container").style.display = "none";
      document.getElementById("heatmap-nav").style.display = "none";
      
      await loadEmployeeList();
    } else {
      document.getElementById("btn-user-checkin").style.display = "inline-block";
      // User: hiện calendar luôn
      document.getElementById("heatmap-container").style.display = "block";
      document.getElementById("heatmap-nav").style.display = "flex";
    }

    startClock();
    
    if (!isAdmin) {
      await loadAttendanceData();
      renderCalendar();
    }
  }

  async function loadEmployeeList() {
    const res = await API.get("/auth/employees");
    if (!res.success) return;
    const sel = document.getElementById("att-emp-id");
    
    const employees = res.data.filter(e => e.role === "employee");
    
    employees.forEach(e => {
      employeeMap[e.id] = e.name;
    });
    
    sel.innerHTML = `<option value="">Chọn nhân viên...</option>` +
      employees.map(e => `<option value="${e.id}">${e.name} (${e.department || 'Chưa có phòng ban'})</option>`).join("");
    
    // Không tự động chọn nhân viên đầu tiên
    // Để trống để user phải chọn
  }

  async function onEmployeeChange() {
    const sel = document.getElementById("att-emp-id");
    const empId = sel.value ? parseInt(sel.value) : null;
    
    if (empId) {
      // Có chọn nhân viên → hiển thị calendar
      currentViewEmployeeId = empId;
      document.getElementById("heatmap-container").style.display = "block";
      document.getElementById("heatmap-nav").style.display = "flex";
      document.getElementById("heatmap-title").innerHTML = `Lịch sử điểm danh của <span class="emp-name">${employeeMap[empId] || 'Nhân viên'}</span>`;
      await loadAttendanceData();
      renderCalendar();
    } else {
      // Chọn lại "Chọn nhân viên..." → ẩn calendar
      currentViewEmployeeId = null;
      document.getElementById("heatmap-container").style.display = "none";
      document.getElementById("heatmap-nav").style.display = "none";
      document.getElementById("heatmap-title").innerHTML = 'Lịch sử điểm danh (chọn nhân viên để xem)';
    }
  }

  function getEmployeeName(id) {
    return employeeMap[id] || `ID ${id}`;
  }

  function startClock() {
    updateClock();
    clockInterval = setInterval(updateClock, 1000);
  }

  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('vi-VN', { hour12: false });
    const dateStr = now.toLocaleDateString('vi-VN');
    document.getElementById('clock-time').textContent = timeStr;
    document.getElementById('clock-date').textContent = dateStr;
  }

  function getTodayStr() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getTimeStr() {
    const now = new Date();
    return now.toLocaleTimeString('vi-VN', { hour12: false });
  }

  // ===== USER CHECKIN =====
  async function userCheckin() {
    const todayStr = getTodayStr();
    const time = getTimeStr();
    const status = getStatusByTime();

    const body = {
      date: todayStr,
      status: status,
      note: `Điểm danh lúc ${time}`
    };

    const res = await API.post("/attendance", body);
    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      await loadAttendanceData();
      renderCalendar();
    }
  }

  // ===== ADMIN CHECKIN =====
  async function adminCheckin() {
    const employee_id = parseInt(document.getElementById("att-emp-id").value);
    const date = document.getElementById("att-date").value;
    const status = document.getElementById("att-status").value;

    if (!employee_id) {
      showToast('Vui lòng chọn nhân viên!', 'error');
      return;
    }
    if (!date) {
      showToast('Vui lòng chọn ngày!', 'error');
      return;
    }

    if (date > today) {
      showToast('Không thể điểm danh cho ngày trong tương lai!', 'error');
      return;
    }

    const checkRes = await API.get(`/attendance?month=${date.slice(0,7)}`);
    let existingRecord = null;
    if (checkRes.success) {
      existingRecord = checkRes.data.find(a => a.date === date && a.employee_id === employee_id);
    }

    let res;
    if (existingRecord) {
      res = await API.put(`/attendance/${existingRecord.id}`, {
        status: status,
        note: `Admin sửa trạng thái thành ${status}`
      });
    } else {
      res = await API.post("/attendance", {
        employee_id: employee_id,
        date: date,
        status: status,
        note: `Admin điểm danh`
      });
    }

    showToast(res.message, res.success ? "success" : "error");
    if (res.success) {
      await loadAttendanceData();
      renderCalendar();
    }
  }

  async function loadAttendanceData() {
    const month = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
    let url = `/attendance?month=${month}`;

    if (isAdmin && currentViewEmployeeId) {
      url += `&employee_id=${currentViewEmployeeId}`;
    }

    const res = await API.get(url);
    
    attendanceData = {};
    allAttendanceRecords = [];
    
    if (res.success && res.data) {
      allAttendanceRecords = res.data;
      res.data.forEach(item => {
        let time = '';
        if (item.note && item.note.includes('lúc')) {
          const match = item.note.match(/lúc (\d{2}:\d{2}:\d{2})/);
          if (match) time = match[1];
        }
        attendanceData[item.date] = {
          status: item.status,
          time: time,
          id: item.id
        };
      });
    }
  }

  function renderCalendar() {
    const grid = document.getElementById('heatmap-grid');
    const monthLabel = document.getElementById('month-label');
    
    const monthNames = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
                        'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
    monthLabel.textContent = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const todayStr = getTodayStr();

    const weekdays = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
    let html = '';
    weekdays.forEach(wd => {
      html += `<div class="heatmap-weekday">${wd}</div>`;
    });

    let offset = (firstDay === 0) ? 6 : firstDay - 1;

    for (let i = 0; i < offset; i++) {
      html += `<div class="heatmap-day empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const data = attendanceData[dateStr];
      const isToday = dateStr === todayStr;
      const isFuture = dateStr > todayStr;
      const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
      const isSunday = dayOfWeek === 0;

      let cls = 'heatmap-day';
      let tooltipText = `${d}/${currentMonth + 1}/${currentYear}`;
      let hasData = false;
      let displayText = String(d);
      let statusBadge = '';

      if (isSunday) {
        cls += ' sunday';
        displayText = 'Nghỉ';
        tooltipText += ' - Chủ nhật nghỉ';
      } else if (isFuture) {
        cls += ' future';
        tooltipText += ' - Chưa đến';
      } else {
        if (data) {
          hasData = true;
          cls += ` ${data.status}`;
          const statusMap = {
            'present': 'Có mặt',
            'late': 'Đi muộn',
            'absent': 'Vắng'
          };
          tooltipText += ` - ${statusMap[data.status] || data.status}`;
          if (data.time) tooltipText += ` (${data.time})`;
          statusBadge = `<span class="status-badge ${data.status}">${statusMap[data.status] || data.status}</span>`;
        } else {
          cls += ' absent';
          tooltipText += ' - Chưa điểm danh';
        }
      }

      if (isToday) cls += ' today';
      if (hasData) cls += ' has-data';

      html += `
        <div class="${cls}" data-date="${dateStr}">
          ${displayText}
          ${statusBadge}
          ${hasData ? `<div class="tooltip">${tooltipText}</div>` : ''}
        </div>
      `;
    }

    grid.innerHTML = html;
  }

  async function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth < 0) {
      currentMonth = 11;
      currentYear--;
    } else if (currentMonth > 11) {
      currentMonth = 0;
      currentYear++;
    }

    await loadAttendanceData();
    renderCalendar();
  }

  window.addEventListener('beforeunload', () => {
    if (clockInterval) clearInterval(clockInterval);
  });

  init();
</script>
</body>
</html>
